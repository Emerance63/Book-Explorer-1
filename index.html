<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book-explorer</title>
   <script src="https://cdn.tailwindcss.com"></script>
      <link rel="stylesheet" href="/style.css" />
</head>
<body id="Prime" class="text-white h-[50%]">
  <header >
    <nav class="Card shadow fixed top-0 left-0 right-0 ">
        <div class="max-w-7xl mx-auto flex justify-between items-center py-4 px-6 ">
          <div class="flex items-center gap-3">
            <div class="w-10  md:w-20">
              <img src="/image/Igire_Rwanda_Logo (1).png" alt="Logo" />
            </div>
            <h1 class="text-xl font-bold">Book-Explorer</h1>
          </div>

          <div class=" hidden md:flex items-center gap-6 font-bold text-lg">
            <a href="#home" class="inline-block hover:bg-orange-600 rounded py-2 px-4">Home</a>
            <a href="#favorites" class="inline-block hover:bg-orange-600 rounded py-2 px-4">Favorites</a>
            <a href="#about" class="inline-block hover:bg-orange-600 rounded py-2 px-4">About</a>
          </div>

             <div
                class="hamburger-menu flex md:hidden flex-col justify-between cursor-pointer h-6 w-8">
               <div class="block h-1 bg-white rounded"></div>
               <div class="block h-1 bg-white rounded"></div>
               <div class="block h-1 bg-white rounded"></div>
             </div>
          </div>
    </nav>
    </header>

<section class="flex justify-center items-center py-40 ">
  <div>

    <div class="hero-card">
      <p class="text-xl font-bold text-orange-500 text-center tracking-widest py-4">Power by Open Library</p>
      <h2 class="text-8xl font-bold mb-4">Discover your next <br> <span class="text-orange-500 text-6xl font-bold">favorite Book</span></h2>
      <p class="text-lg text-gray-300">Explore our collection and find your next great read!</p>
    </div>

    <div class="mt-8 flex gap-2">

      <input type="text" placeholder="Search for books..." class="bg-orange-200  px-4 py-2 rounded font-semibold shadow-lg shadow-orange-300/30">

      <button class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 px-4 rounded">Search</button>
    </div>
  </div>
</section>           
        
</body>
</html>
